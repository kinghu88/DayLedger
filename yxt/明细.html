<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Transaction History</title>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS CDN with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration for Theme Customization -->
<script data-purpose="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: '#1152d4',
              light: '#e7eefa',
              dark: '#0e42ab',
            }
          },
          borderRadius: {
            'custom': '8px', // ROUND_EIGHT
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>
<style data-purpose="custom-overrides">
    body {
      background-color: #f9fafb;
      -webkit-tap-highlight-color: transparent;
    }
    /* Hide scrollbar for cleaner mobile look */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="font-sans text-slate-900 bg-gray-50 flex flex-col min-h-screen">
<!-- BEGIN: MainHeader -->
<header class="sticky top-0 z-30 bg-white border-b border-gray-100 px-4 pt-6 pb-4" data-purpose="header-section">
<div class="flex items-center justify-between mb-4">
<h1 class="text-2xl font-bold tracking-tight">历史明细</h1>
<!-- Profile or Status icon -->
<div class="w-8 h-8 rounded-full bg-primary-light flex items-center justify-center">
<svg class="h-5 w-5 text-primary" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" fill-rule="evenodd"></path>
</svg>
</div>
</div>
<!-- Search and Filter Container -->
<div class="flex gap-2">
<div class="relative flex-grow">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</span>
<input class="block w-full pl-10 pr-3 py-2 border border-gray-200 rounded-custom text-sm focus:ring-primary focus:border-primary bg-gray-50" data-purpose="search-bar" placeholder="搜索交易..." type="text"/>
</div>
<button class="p-2 border border-gray-200 rounded-custom bg-white hover:bg-gray-50" data-purpose="filter-button">
<svg class="h-5 w-5 text-gray-600" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
</header>
<!-- END: MainHeader -->
<!-- BEGIN: TransactionList -->
<main class="flex-grow px-4 pb-24 overflow-y-auto no-scrollbar" data-purpose="transaction-list-container">
<!-- Today's Group -->
<section class="mt-6">
<h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">今天</h2>
<div class="space-y-3">
<!-- Transaction Item -->
<article class="bg-white p-3 rounded-custom shadow-sm border border-gray-50 flex items-center justify-between" data-purpose="transaction-item">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-custom bg-orange-100 flex items-center justify-center text-orange-600">
<!-- Food/Coffee Icon -->
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<div>
<p class="font-semibold text-gray-900">星巴克咖啡</p>
<p class="text-xs text-gray-500">餐饮美食 • 早茶休息</p>
</div>
</div>
<p class="font-bold text-red-500">-￥5.50</p>
</article>
<!-- Transaction Item -->
<article class="bg-white p-3 rounded-custom shadow-sm border border-gray-50 flex items-center justify-between" data-purpose="transaction-item">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-custom bg-green-100 flex items-center justify-center text-green-600">
<!-- Salary/Income Icon -->
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<div>
<p class="font-semibold text-gray-900">工资存入</p>
<p class="text-xs text-gray-500">收入 • 月度结算</p>
</div>
</div>
<p class="font-bold text-green-600">+￥2,450.00</p>
</article>
</div>
</section>
<!-- Yesterday's Group -->
<section class="mt-8">
<h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">昨天</h2>
<div class="space-y-3">
<!-- Transaction Item -->
<article class="bg-white p-3 rounded-custom shadow-sm border border-gray-50 flex items-center justify-between" data-purpose="transaction-item">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-custom bg-blue-100 flex items-center justify-center text-blue-600">
<!-- Transport Icon -->
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<div>
<p class="font-semibold text-gray-900">优步行程</p>
<p class="text-xs text-gray-500">交通出行 • 上班通勤</p>
</div>
</div>
<p class="font-bold text-red-500">-￥18.20</p>
</article>
<!-- Transaction Item -->
<article class="bg-white p-3 rounded-custom shadow-sm border border-gray-50 flex items-center justify-between" data-purpose="transaction-item">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-custom bg-purple-100 flex items-center justify-center text-purple-600">
<!-- Shopping Icon -->
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<div>
<p class="font-semibold text-gray-900">亚马逊</p>
<p class="text-xs text-gray-500">购物 • 电子产品</p>
</div>
</div>
<p class="font-bold text-red-500">-￥64.00</p>
</article>
<!-- Transaction Item -->
<article class="bg-white p-3 rounded-custom shadow-sm border border-gray-50 flex items-center justify-between" data-purpose="transaction-item">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-custom bg-yellow-100 flex items-center justify-center text-yellow-600">
<!-- Utilities Icon -->
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<div>
<p class="font-semibold text-gray-900">电费账单</p>
<p class="text-xs text-gray-500">生活缴费 • 八月账单</p>
</div>
</div>
<p class="font-bold text-red-500">-￥120.50</p>
</article>
</div>
</section>
</main>
<!-- END: TransactionList -->
<!-- BEGIN: BottomNavigation -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 px-6 py-3 flex items-center justify-between z-40" data-purpose="bottom-nav">
<a class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors" href="#">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-medium">首页</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary transition-colors" data-purpose="active-nav-item" href="#">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-bold">明细</span>
</a>
<!-- Add Transaction Floating Button (Center Placeholder Style) -->
<div class="relative -top-6">
<button class="bg-primary text-white p-3 rounded-full shadow-lg shadow-primary/30 border-4 border-gray-50 active:scale-95 transition-transform">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 4v16m8-8H4" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></path>
</svg>
</button>
</div>
<a class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors" href="#">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-medium">统计</span>
</a>
<a class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors" href="#">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-medium">设置</span>
</a>
</nav>
<!-- END: BottomNavigation -->
</body></html>
