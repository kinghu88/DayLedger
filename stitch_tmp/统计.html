<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Insights - Mobile Bookkeeping</title>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: '#1152d4',
              light: '#e7eefa',
              dark: '#0e42ab',
            }
          },
          borderRadius: {
            'custom': '8px',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>
<style data-purpose="global-typography">
    body {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    /* Hide scrollbar for horizontal scrolling but keep functionality */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
<style data-purpose="chart-layout">
    /* Custom height for bar chart container to ensure consistency on mobile */
    .chart-container {
      height: 200px;
    }
    .bar-animation {
      transition: height 0.6s ease-out;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">
<!-- BEGIN: MainHeader -->
<header class="bg-white pt-10 pb-2 px-4 shadow-sm sticky top-0 z-10" data-purpose="app-header">
<div class="flex justify-between items-center mb-6">
<h1 class="text-2xl font-bold">收支统计</h1>
<button aria-label="Notifications" class="p-2 rounded-full hover:bg-gray-100">
<svg class="h-6 w-6 text-gray-600" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
<!-- Period Selector Tabs -->
<nav class="flex bg-gray-100 p-1 rounded-custom mb-3" data-purpose="period-selector">
<button class="flex-1 py-2 text-sm font-medium text-gray-500 rounded-custom">周</button>
<button class="flex-1 py-2 text-sm font-semibold text-primary bg-white shadow-sm rounded-custom">月</button>
<button class="flex-1 py-2 text-sm font-medium text-gray-500 rounded-custom">年</button>
</nav>
<!-- Sub-period Horizontal Scroller -->
<div class="overflow-x-auto no-scrollbar pb-2" data-purpose="sub-period-selector">
<div class="flex space-x-2 min-w-max">
<button class="px-4 py-1.5 text-sm font-medium text-gray-500 bg-gray-50 rounded-full">1月</button>
<button class="px-4 py-1.5 text-sm font-medium text-gray-500 bg-gray-50 rounded-full">2月</button>
<button class="px-4 py-1.5 text-sm font-medium text-gray-500 bg-gray-50 rounded-full">3月</button>
<button class="px-4 py-1.5 text-sm font-medium text-gray-500 bg-gray-50 rounded-full">4月</button>
<button class="px-4 py-1.5 text-sm font-medium text-gray-500 bg-gray-50 rounded-full">上月</button>
<button class="px-4 py-1.5 text-sm font-semibold text-white bg-primary rounded-full shadow-sm">本月</button>
<button class="px-4 py-1.5 text-sm font-medium text-gray-300 bg-gray-50 rounded-full cursor-not-allowed">6月</button>
</div>
</div>
</header>
<!-- END: MainHeader -->
<!-- BEGIN: MainContent -->
<main class="flex-grow p-4 space-y-6 pb-24">
<!-- BEGIN: SpendingChartSection -->
<section class="bg-white p-5 rounded-custom shadow-sm" data-purpose="spending-trends">
<div class="flex justify-between items-center mb-6">
<h2 class="font-semibold text-gray-700">消费趋势 (本月)</h2>
<span class="text-xs text-gray-400">5月1日 - 5月31日</span>
</div>
<!-- Simple Bar Chart Representation -->
<div class="chart-container flex items-end justify-between gap-2 px-2" data-purpose="bar-chart">
<div class="flex-1 flex flex-col items-center gap-2">
<div class="w-full bg-blue-100 rounded-t-sm bar-animation" style="height: 40%;"></div>
<span class="text-[10px] text-gray-400">W1</span>
</div>
<div class="flex-1 flex flex-col items-center gap-2">
<div class="w-full bg-blue-200 rounded-t-sm bar-animation" style="height: 65%;"></div>
<span class="text-[10px] text-gray-400">W2</span>
</div>
<div class="flex-1 flex flex-col items-center gap-2">
<div class="w-full bg-primary rounded-t-sm bar-animation" style="height: 90%;"></div>
<span class="text-[10px] text-gray-400">W3</span>
</div>
<div class="flex-1 flex flex-col items-center gap-2">
<div class="w-full bg-blue-300 rounded-t-sm bar-animation" style="height: 55%;"></div>
<span class="text-[10px] text-gray-400">W4</span>
</div>
</div>
</section>
<!-- END: SpendingChartSection -->
<!-- BEGIN: BudgetSection -->
<section class="bg-white p-5 rounded-custom shadow-sm" data-purpose="budget-tracking">
<div class="flex justify-between items-end mb-3">
<div>
<h2 class="font-semibold text-gray-700">本月预算</h2>
<p class="text-sm text-gray-500 mt-1">65% of $2,000 已用</p>
</div>
<p class="text-lg font-bold text-gray-800">$1,300.00</p>
</div>
<!-- Progress Bar -->
<div class="w-full bg-gray-100 h-3 rounded-full overflow-hidden">
<div class="bg-primary h-full rounded-full" style="width: 65%;"></div>
</div>
<p class="text-xs text-right mt-2 text-gray-400">剩余 $700</p>
</section>
<!-- END: BudgetSection -->
<!-- BEGIN: CategoryBreakdownSection -->
<section class="space-y-4" data-purpose="category-list">
<h2 class="font-semibold text-gray-700 px-1">本月主要支出</h2>
<div class="space-y-3">
<!-- Category Item 1 -->
<div class="bg-white p-4 rounded-custom flex items-center justify-between shadow-sm">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-orange-100 flex items-center justify-center text-orange-600">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<div>
<p class="font-medium text-gray-800">购物</p>
<p class="text-xs text-gray-500">占比 42%</p>
</div>
</div>
<p class="font-semibold text-gray-800">$546.00</p>
</div>
<!-- Category Item 2 -->
<div class="bg-white p-4 rounded-custom flex items-center justify-between shadow-sm">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-green-100 flex items-center justify-center text-green-600">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<div>
<p class="font-medium text-gray-800">交通</p>
<p class="text-xs text-gray-500">占比 28%</p>
</div>
</div>
<p class="font-semibold text-gray-800">$364.00</p>
</div>
<!-- Category Item 3 -->
<div class="bg-white p-4 rounded-custom flex items-center justify-between shadow-sm">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center text-purple-600">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<div>
<p class="font-medium text-gray-800">娱乐</p>
<p class="text-xs text-gray-500">占比 15%</p>
</div>
</div>
<p class="font-semibold text-gray-800">$195.00</p>
</div>
</div>
</section>
<!-- END: CategoryBreakdownSection -->
</main>
<!-- END: MainContent -->
<!-- BEGIN: BottomNavigation -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 px-6 py-3 flex items-center justify-between z-40" data-purpose="main-navigation">
<!-- Home -->
<a class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors" href="#">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-medium">首页</span>
</a>
<!-- History -->
<a class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors" href="#">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-medium">明细</span>
</a>
<!-- Add Transaction Floating Button -->
<div class="relative -top-6">
<button class="bg-primary text-white p-3 rounded-full shadow-lg shadow-primary/30 border-4 border-gray-50 active:scale-95 transition-transform">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 4v16m8-8H4" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></path>
</svg>
</button>
</div>
<!-- Stats (Active) -->
<a class="flex flex-col items-center gap-1 text-primary transition-colors" href="#">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-bold">统计</span>
</a>
<!-- Settings -->
<a class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors" href="#">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-medium">设置</span>
</a>
</nav>
<!-- END: BottomNavigation -->
</body></html>
